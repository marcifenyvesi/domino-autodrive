name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  selftest:
    name: engine + hooks self-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git identity (worktree tests need one)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Hooks + scope-algebra self-test (114 assertions)
        run: python3 harness/hooks/_selftest.py

      - name: Engine / claims / lease / merge self-test (121 assertions)
        run: python3 harness/autodrive/_selftest.py
